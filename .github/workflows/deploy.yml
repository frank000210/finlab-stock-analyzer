name: Deploy to Zeabur

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Zeabur
        run: npx zeabur deploy --project-id 6a3f6ff522d1fdaf7eb04d04 --service-id 6a3f700322d1fdaf7eb04d06 -i=false
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
